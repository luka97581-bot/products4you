<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>products4you</title>

<style>
body { margin:0; font-family:Arial; background:#0f0f0f; color:white; }
header { padding:20px; text-align:center; font-size:26px; background:#000; }

#products {
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card {
  background:#1a1a1a;
  padding:15px;
  border-radius:15px;
  transition:0.2s;
}
.card:hover { transform: scale(1.03); }

img { width:100%; border-radius:10px; }

button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#00c853;
  color:white;
  cursor:pointer;
}

#cartBtn {
  position:fixed;
  top:20px;
  right:20px;
  background:#ff9800;
  padding:10px 15px;
  border-radius:10px;
}

#cart {
  position:fixed;
  right:0;
  top:0;
  width:300px;
  height:100%;
  background:#111;
  padding:20px;
  display:none;
  overflow:auto;
}

input {
  width:100%;
  padding:8px;
  margin-top:5px;
}
</style>
</head>

<body>

<header>🛒 products4you</header>

<button id="cartBtn" onclick="toggleCart()">🛒 Warenkorb</button>

<div id="products"></div>

<div id="cart">
  <h2>Warenkorb</h2>
  <div id="cartItems"></div>

  <input id="address" placeholder="Adresse">
  <input id="message" placeholder="Nachricht">

  <button onclick="checkout()">Bestellen</button>
</div>

<script>

// 🔥 PRODUKTE HIER HINZUFÜGEN
const products = [
  {
    id:1,
    name:"Sneaker",
    description:"Coole Schuhe",
    price:50,
    image:"https://i.imgur.com/abc123.png",
    paypal:"https://paypal.me/MaxSchuster496/50"
  },
  {
    id:2,
    name:"Hoodie",
    description:"Stylischer Hoodie",
    price:40,
    image:"https://i.imgur.com/abc123.png",
    paypal:"https://paypal.me/MaxSchuster496/40"
  }
];

let cart = [];

function loadProducts() {
  const container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach(p => {
    container.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p>${p.description}</p>
        <b>${p.price} €</b>
        <button onclick="addToCart(${p.id})">In Warenkorb</button>
        <button onclick="buyNow(${p.id})">Sofort kaufen</button>
      </div>
    `;
  });
}

function addToCart(id) {
  const product = products.find(p => p.id === id);
  cart.push(product);
  renderCart();
}

function renderCart() {
  const container = document.getElementById("cartItems");
  container.innerHTML = "";

  cart.forEach(p => {
    container.innerHTML += `<p>${p.name} - ${p.price}€</p>`;
  });
}

function toggleCart() {
  const cartDiv = document.getElementById("cart");
  cartDiv.style.display = cartDiv.style.display === "block" ? "none" : "block";
}

function buyNow(id) {
  const product = products.find(p => p.id === id);
  window.open(product.paypal, "_blank");
}

function checkout() {
  const address = document.getElementById("address").value;
  const message = document.getElementById("message").value;

  if (!address) return alert("Adresse fehlt");

  let text = "Neue Bestellung:%0D%0A";

  cart.forEach(p => {
    text += `${p.name} - ${p.price}€%0D%0A`;
  });

  text += `%0D%0AAdresse: ${address}%0D%0A`;
  text += `Nachricht: ${message}`;

  // 📧 EMAIL
  window.location.href = `mailto:luka@gerigk-web.de?subject=Neue Bestellung&body=${text}`;

  alert("Email wird geöffnet!");

  cart = [];
  renderCart();
}

loadProducts();
</script>

</body>
</html>
