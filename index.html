<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Mein Shop</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f9f9f9; color: #333; }
    .product { border: 1px solid #ccc; padding: 15px; margin: 15px 0; border-radius: 8px; max-width: 400px; }
    img { max-width: 100%; height: auto; border-radius: 5px; }
    button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    button:hover { background: #0056b3; }
  </style>
</head>
<body>
  <h1>Mein Shop</h1>
  <div id="products"></div>

  <script>
    // === DEINE FIREBASE CONFIG HIER EINFÜGEN ===
    const firebaseConfig = {
      apiKey: "DEINE_API_KEY",
      authDomain: "DEIN-PROJEKT.firebaseapp.com",
      projectId: "DEIN-PROJEKT",
      storageBucket: "DEIN-PROJEKT.appspot.com",
      messagingSenderId: "123456789",
      appId: "DEINE_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    emailjs.init("DEINE_EMAILJS_PUBLIC_KEY");

    async function loadProducts() {
      const snap = await db.collection("products").get();
      const container = document.getElementById("products");
      container.innerHTML = "";

      snap.forEach(doc => {
        const p = doc.data();
        if (p.qty <= 0) return;

        const div = document.createElement("div");
        div.className = "product";
        div.innerHTML = `
          <img src="${p.imageUrl}" alt="${p.name}">
          <h2>${p.name}</h2>
          <p>${p.description}</p>
          <p>Preis: ${p.price} €</p>
          <p>Verfügbare Menge: ${p.qty}</p>
          <button onclick="buyProduct('${doc.id}', '${p.name}', ${p.price})">Jetzt kaufen</button>
        `;
        container.appendChild(div);
      });
    }

    window.buyProduct = async function(id, name, price) {
      const address = prompt("Bitte gib deine Lieferadresse ein:");
      const message = prompt("Optionale Nachricht an den Verkäufer:");

      if (!address) {
        alert("Die Adresse ist erforderlich.");
        return;
      }

      // E-Mail an dich senden
      const templateParams = {
        product_name: name,
        price: price,
        address: address,
        message: message || "Keine Nachricht"
      };

      try {
        await emailjs.send("DEINE_SERVICE_ID", "DEIN_TEMPLATE_ID", templateParams);
        alert("Bestellung wurde gesendet. Du erhältst eine Bestätigung per E-Mail.");
      } catch (e) {
        alert("Fehler beim Senden der E-Mail.");
        console.error(e);
      }

      // Menge reduzieren
      const docRef = db.collection("products").doc(id);
      const snap = await docRef.get();
      const currentQty = snap.data().qty;

      if (currentQty > 0) {
        await docRef.update({ qty: currentQty - 1 });
      }

      // PayPal-Link öffnen
      const paypalLink = `https://www.paypal.me/DEIN_PAYPAL_USERNAME/${price}`;
      window.open(paypalLink, "_blank");
    };

    // Produkte beim Laden der Seite anzeigen
    loadProducts();
  </script>
</body>
</html>
