<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Shop</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
}

header {
  padding: 20px;
  text-align: center;
  font-size: 26px;
  background: black;
}

#products {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: #1a1a1a;
  padding: 15px;
  border-radius: 15px;
}

img {
  width: 100%;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>🛒 products4you</header>

<div id="products">Lade...</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyByaqQCKC4pC8eBPczFT8m6Uo8PSeZvAWM",
  authDomain: "products4you-f45e9.firebaseapp.com",
  projectId: "products4you-f45e9"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const container = document.getElementById("products");

db.collection("products")
  .orderBy("createdAt", "desc")
  .onSnapshot(snapshot => {

    container.innerHTML = "";

    snapshot.forEach(doc => {
      const p = doc.data();

      container.innerHTML += `
        <div class="card">
          <img src="${p.imageUrl}">
          <h3>${p.name}</h3>
          <p>${p.description || ""}</p>
          <b>${Number(p.price).toFixed(2)} €</b>
        </div>
      `;
    });

  }, err => {
    container.innerHTML = "Fehler beim Laden";
    console.error(err);
  });
</script>

</body>
</html>
