<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>products4you Shop</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; background:#111; color:white; margin:0; }
header { padding:20px; text-align:center; font-size:22px; background:#000; }

#products {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.product {
  background:#1c1c1c;
  padding:15px;
  border-radius:12px;
}

img { width:100%; border-radius:10px; }

button {
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#00c853;
  border:none;
  color:white;
  border-radius:10px;
}

input {
  width:100%;
  padding:8px;
  margin-top:5px;
}
.soldout {
  background:red;
  padding:8px;
  text-align:center;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<header>🛒 products4you</header>
<div id="products">Lade Produkte...</div>

<script>
console.log("JS läuft");

const firebaseConfig = {
  apiKey: "AIzaSyByaqQCKC4pC8eBPczFT8m6Uo8PSeZvAWM",
  authDomain: "products4you-f45e9.firebaseapp.com",
  projectId: "products4you-f45e9"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// PAYPAL
const PAYPAL = "https://paypal.me/MaxSchuster496";

async function loadProducts() {
  const container = document.getElementById("products");

  try {
    const snap = await db.collection("products").get();

    container.innerHTML = "";

    if (snap.empty) {
      container.innerHTML = "<p>Keine Produkte vorhanden</p>";
      return;
    }

    snap.forEach(doc => {
      const p = doc.data();

      let html = `
      <div class="product">
        <img src="${p.imageUrl}">
        <h3>${p.name}</h3>
        <p>${p.description}</p>
        <b>${p.price} €</b>
      `;

      if (p.qty <= 0) {
        html += `<div class="soldout">AUSVERKAUFT</div>`;
      } else {
        html += `
          <input placeholder="Adresse" id="a-${doc.id}">
          <input placeholder="Nachricht" id="m-${doc.id}">
          <button onclick="buy('${doc.id}','${p.name}',${p.price})">Kaufen</button>
        `;
      }

      html += `</div>`;
      container.innerHTML += html;
    });

  } catch (e) {
    console.error(e);
    container.innerHTML = "<h2>Fehler beim Laden</h2>";
  }
}

async function buy(id, name, price) {
  const addr = document.getElementById("a-" + id).value;
  const msg = document.getElementById("m-" + id).value;

  if (!addr) return alert("Adresse fehlt");

  const ref = db.collection("products").doc(id);
  const doc = await ref.get();

  if (doc.data().qty <= 0) {
    alert("Ausverkauft");
    return;
  }

  await db.collection("orders").add({
    productName: name,
    price: price,
    address: addr,
    message: msg,
    createdAt: new Date()
  });

  await ref.update({
    qty: doc.data().qty - 1
  });

  window.open(PAYPAL + "/" + price, "_blank");

  alert("Bestellt!");
  loadProducts();
}

loadProducts();
</script>

</body>
</html>
