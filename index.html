<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>products4you</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
}

header {
  padding: 20px;
  text-align: center;
  background: black;
  font-size: 28px;
}

#products {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: #1a1a1a;
  padding: 15px;
  border-radius: 15px;
}

img {
  width: 100%;
  border-radius: 10px;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #00c853;
  color: white;
  cursor: pointer;
}

/* CART BUTTON */
#cartBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 65px;
  height: 65px;
  border-radius: 50%;
  background: orange;
  border: none;
  font-size: 22px;
}
</style>
</head>

<body>

<header>🛒 products4you</header>

<div id="products"></div>

<button id="cartBtn">🛒</button>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyByaqQCKC4pC8eBPczFT8m6Uo8PSeZvAWM",
  authDomain: "products4you-f45e9.firebaseapp.com",
  projectId: "products4you-f45e9"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

/* PRODUKTE LADEN */
function loadProducts() {

  const container = document.getElementById("products");
  container.innerHTML = "";

  db.collection("products")
    .orderBy("createdAt", "desc")
    .onSnapshot(snapshot => {

      container.innerHTML = "";

      snapshot.forEach(doc => {
        const p = doc.data();

        container.innerHTML += `
          <div class="card">
            <img src="${p.imageUrl}">
            <h3>${p.name}</h3>
            <p>${p.description || ""}</p>
            <b>${p.price} €</b>
            <button>In Warenkorb</button>
          </div>
        `;
      });
    });
}

loadProducts();

</script>

</body>
</html>
