<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>products4you</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  margin: 0;
}

header {
  background: black;
  padding: 20px;
  text-align: center;
  font-size: 24px;
}

#products {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px,1fr));
  gap: 20px;
  padding: 20px;
}

.product {
  background: #1a1a1a;
  padding: 15px;
  border-radius: 15px;
  transition: 0.3s;
}

.product:hover {
  transform: scale(1.03);
}

img {
  width: 100%;
  border-radius: 10px;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: #00c853;
  border: none;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

.soldout {
  background: red;
  text-align: center;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
}

input {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
}
</style>
</head>

<body>

<header>🛒 products4you</header>
<div id="products"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyByaqQCKC4pC8eBPczFT8m6Uo8PSeZvAWM",
  authDomain: "products4you-f45e9.firebaseapp.com",
  projectId: "products4you-f45e9"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

emailjs.init("ttM5iNjN5W70UtYa22IeE");

function sendEmail(addr, msg, name, price) {
  emailjs.send("service_r2voupa", "template_k7hcmkc", {
    address: addr,
    message: msg,
    productName: name,
    price: price
  });
}

async function loadProducts() {
  const container = document.getElementById("products");
  container.innerHTML = "";

  const snap = await db.collection("products").get();

  snap.forEach(doc => {
    const p = doc.data();

    let content = `
      <div class="product">
        <img src="${p.imageUrl}">
        <h3>${p.name}</h3>
        <p>${p.description}</p>
        <b>${p.price} €</b>
    `;

    if (p.qty <= 0) {
      content += `<div class="soldout">AUSVERKAUFT</div>`;
    } else {
      content += `
        <input placeholder="Adresse" id="a-${doc.id}">
        <input placeholder="Nachricht" id="m-${doc.id}">
        <button onclick="buy('${doc.id}','${p.name}',${p.price})">Kaufen</button>
      `;
    }

    content += `</div>`;
    container.innerHTML += content;
  });
}

async function buy(id, name, price) {
  const addr = document.getElementById("a-" + id).value;
  const msg = document.getElementById("m-" + id).value;

  if (!addr) return alert("Adresse fehlt");

  const ref = db.collection("products").doc(id);
  const docSnap = await ref.get();

  if (docSnap.data().qty <= 0) return alert("Ausverkauft");

  await db.collection("orders").add({
    productName: name,
    price: price,
    address: addr,
    message: msg,
    createdAt: new Date()
  });

  await ref.update({
    qty: docSnap.data().qty - 1
  });

  sendEmail(addr, msg, name, price);

  window.open("https://paypal.me/MaxSchuster496/" + price, "_blank");

  alert("Bestellt! Bitte PayPal zahlen.");
  loadProducts();
}

loadProducts();
</script>

</body>
</html>
