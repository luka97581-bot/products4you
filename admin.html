<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
}

#panel {
  display: none;
  padding: 20px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #1a1a1a;
  color: white;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #00c853;
  color: white;
  cursor: pointer;
}

#loginBtn {
  position: fixed;
  bottom: 20px;
  left: 20px;
  width: 65px;
  height: 65px;
  border-radius: 50%;
  background: #2196f3;
  border: none;
  font-size: 22px;
  color: white;
  cursor: pointer;
}

#loginPopup {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: none;
  justify-content: center;
  align-items: center;
}

#loginPopup .box {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 12px;
  width: 300px;
}
</style>
</head>

<body>

<button id="loginBtn" onclick="toggleLogin()">🔐</button>

<div id="loginPopup">
  <div class="box">
    <h3>Admin Login</h3>

    <input id="email" placeholder="E-Mail">
    <input id="password" type="password" placeholder="Passwort">

    <button onclick="login()">Login</button>
  </div>
</div>

<div id="panel">

  <h2>📦 Produkt hinzufügen</h2>

  <input id="name" placeholder="Produktname">
  <textarea id="desc" placeholder="Beschreibung"></textarea>
  <input id="price" type="number" placeholder="Preis">
  <input id="image" type="file">

  <button onclick="uploadProduct()">Speichern</button>
  <button onclick="logout()" style="background:red;">Logout</button>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyByaqQCKC4pC8eBPczFT8m6Uo8PSeZvAWM",
  authDomain: "products4you-f45e9.firebaseapp.com",
  projectId: "products4you-f45e9",
  storageBucket: "products4you-f45e9.appspot.com"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

const ADMIN_EMAIL = "luka@gerigk-web.de";

/* LOGIN POPUP */
function toggleLogin() {
  const popup = document.getElementById("loginPopup");
  popup.style.display = popup.style.display === "flex" ? "none" : "flex";
}

/* LOGIN */
function login() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, pass)
    .then(() => {
      document.getElementById("loginPopup").style.display = "none";
    })
    .catch(err => alert("Login Fehler: " + err.message));
}

/* LOGOUT */
function logout() {
  auth.signOut();
}

/* CHECK ADMIN */
auth.onAuthStateChanged(user => {
  document.getElementById("panel").style.display =
    (user && user.email === ADMIN_EMAIL) ? "block" : "none";
});

/* UPLOAD */
async function uploadProduct() {
  const name = document.getElementById("name").value;
  const desc = document.getElementById("desc").value;
  const price = document.getElementById("price").value;
  const file = document.getElementById("image").files[0];

  if (!name || !price || !file) {
    return alert("Bitte alles ausfüllen");
  }

  try {
    const ref = storage.ref("products/" + Date.now() + "_" + file.name);

    await ref.put(file);
    const url = await ref.getDownloadURL();

    await db.collection("products").add({
      name,
      description: desc,
      price: Number(price),
      imageUrl: url,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    alert("Produkt gespeichert!");

    document.getElementById("name").value = "";
    document.getElementById("desc").value = "";
    document.getElementById("price").value = "";
    document.getElementById("image").value = "";

  } catch (e) {
    alert("Fehler: " + e.message);
    console.error(e);
  }
}
</script>

</body>
</html>
