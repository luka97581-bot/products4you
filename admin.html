<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Admin</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

<style>
body { font-family: Arial; background:#111; color:white; padding:20px; }
input, textarea { display:block; margin:10px 0; width:300px; }
.order { background:#1a1a1a; padding:10px; margin:10px 0; border-radius:10px; }
</style>
</head>
<body>

<h1>Admin</h1>

<div id="login">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Passwort">
<button onclick="login()">Login</button>
</div>

<div id="panel" style="display:none;">
<h2>Produkt hochladen</h2>
<input id="name" placeholder="Name">
<textarea id="desc"></textarea>
<input id="price" type="number">
<input id="qty" type="number">
<input id="image" type="file">
<button onclick="upload()">Upload</button>

<h2>Bestellungen</h2>
<div id="orders"></div>

<button onclick="logout()">Logout</button>
</div>

<script>
const ADMIN = "luka@gerigk-web.de";

const firebaseConfig = {
  apiKey: "AIzaSyByaqQCKC4pC8eBPczFT8m6Uo8PSeZvAWM",
  authDomain: "products4you-f45e9.firebaseapp.com",
  projectId: "products4you-f45e9",
  storageBucket: "products4you-f45e9.appspot.com"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

function login() {
  auth.signInWithEmailAndPassword(email.value, password.value);
}

function logout() {
  auth.signOut();
}

async function upload() {
  const user = auth.currentUser;
  if (!user || user.email !== ADMIN) return alert("Kein Zugriff");

  const file = image.files[0];
  const ref = storage.ref("products/" + Date.now() + file.name);

  await ref.put(file);
  const url = await ref.getDownloadURL();

  await db.collection("products").add({
    name: name.value,
    description: desc.value,
    price: parseFloat(price.value),
    qty: parseInt(qty.value),
    imageUrl: url
  });

  alert("Hochgeladen");
}

async function loadOrders() {
  const container = document.getElementById("orders");
  container.innerHTML = "";

  const snap = await db.collection("orders").orderBy("createdAt","desc").get();

  snap.forEach(doc => {
    const o = doc.data();

    container.innerHTML += `
      <div class="order">
        <b>${o.productName}</b> (${o.price} €)<br>
        Adresse: ${o.address}<br>
        Nachricht: ${o.message}
      </div>
    `;
  });
}

auth.onAuthStateChanged(user => {
  if (user && user.email === ADMIN) {
    login.style.display = "none";
    panel.style.display = "block";
    loadOrders();
  }
});
</script>

</body>
</html>
