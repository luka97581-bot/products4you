<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
}

.center {
  max-width: 350px;
  margin: 80px auto;
  background: #1a1a1a;
  padding: 20px;
  border-radius: 12px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #222;
  color: white;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #00c853;
  color: white;
  cursor: pointer;
}

#panel {
  display: none;
  padding: 20px;
}

.logout {
  background: red;
}
</style>
</head>

<body>

<div id="loginBox" class="center">
  <h2>Admin Login</h2>
  <input id="email" placeholder="E-Mail">
  <input id="password" type="password" placeholder="Passwort">
  <button onclick="login()">Login</button>
</div>

<div id="panel">

  <h2>Produkt hinzufügen</h2>

  <input id="name" placeholder="Name">
  <textarea id="desc" placeholder="Beschreibung"></textarea>
  <input id="price" type="number" placeholder="Preis">
  <input id="image" type="file">

  <button onclick="uploadProduct()">Speichern</button>
  <button class="logout" onclick="logout()">Logout</button>

</div>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyByaqQCKC4pC8eBPczFT8m6Uo8PSeZvAWM",
  authDomain: "products4you-f45e9.firebaseapp.com",
  projectId: "products4you-f45e9",
  storageBucket: "products4you-f45e9.appspot.com"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

const ADMIN_EMAIL = "luka@gerigk-web.de";

/* LOGIN */
function login() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, pass)
    .catch(e => alert(e.message));
}

/* LOGOUT */
function logout() {
  auth.signOut();
}

/* AUTH CHECK */
auth.onAuthStateChanged(user => {

  if (user && user.email === ADMIN_EMAIL) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("panel").style.display = "block";
  } else {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("panel").style.display = "none";
  }
});

/* UPLOAD PRODUKT */
async function uploadProduct() {

  const name = document.getElementById("name").value;
  const desc = document.getElementById("desc").value;
  const price = document.getElementById("price").value;
  const file = document.getElementById("image").files[0];

  if (!name || !price || !file) return alert("Fehlt etwas");

  const imgRef = storage.ref("products/" + Date.now() + "_" + file.name);

  await imgRef.put(file);
  const url = await imgRef.getDownloadURL();

  await db.collection("products").add({
    name,
    description: desc,
    price: Number(price),
    imageUrl: url,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });

  alert("Produkt gespeichert!");

  document.getElementById("name").value = "";
  document.getElementById("desc").value = "";
  document.getElementById("price").value = "";
  document.getElementById("image").value = "";
}

</script>

</body>
</html>
