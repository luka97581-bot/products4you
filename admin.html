<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Admin Bereich</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
  
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f9f9f9; color: #333; }
    input, textarea { display: block; margin: 10px 0; padding: 8px; width: 300px; }
    button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Admin Bereich</h1>

  <div id="loginSection">
    <h2>Anmelden</h2>
    <input id="email" type="email" placeholder="E-Mail"><br>
    <input id="password" type="password" placeholder="Passwort"><br>
    <button onclick="login()">Anmelden</button>
  </div>

  <div id="uploadSection" style="display: none;">
    <h2>Neues Produkt hinzufügen</h2>
    <input id="name" placeholder="Produktname"><br>
    <textarea id="desc" placeholder="Beschreibung" rows="4"></textarea><br>
    <input id="price" type="number" step="0.01" placeholder="Preis in €"><br>
    <input id="qty" type="number" placeholder="Menge (z. B. 1 = nur einmal verfügbar)"><br>
    <input id="image" type="file" accept="image/*"><br><br>
    <button onclick="uploadProduct()">Produkt hochladen</button>
    <button onclick="logout()">Abmelden</button>
  </div>

  <script>
    // === DEINE FIREBASE CONFIG HIER EINFÜGEN (genau wie oben) ===
    const firebaseConfig = {
      apiKey: "DEINE_API_KEY",
      authDomain: "DEIN-PROJEKT.firebaseapp.com",
      projectId: "DEIN-PROJEKT",
      storageBucket: "DEIN-PROJEKT.appspot.com",
      messagingSenderId: "123456789",
      appId: "DEINE_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();

    window.login = async function() {
      const email = document.getElementById("email").value;
      const pass = document.getElementById("password").value;

      try {
        await auth.signInWithEmailAndPassword(email, pass);
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("uploadSection").style.display = "block";
      } catch (e) {
        alert("Anmeldung fehlgeschlagen. Bitte überprüfe E-Mail und Passwort.");
      }
    };

    window.logout = function() {
      auth.signOut().then(() => {
        location.reload();
      });
    };

    window.uploadProduct = async function() {
      const file = document.getElementById("image").files[0];
      if (!file) {
        alert("Bitte wähle ein Bild aus.");
        return;
      }

      const name = document.getElementById("name").value;
      const desc = document.getElementById("desc").value;
      const price = parseFloat(document.getElementById("price").value);
      const qty = parseInt(document.getElementById("qty").value);

      if (!name || !price || isNaN(qty)) {
        alert("Bitte fülle alle Felder korrekt aus.");
        return;
      }

      try {
        // Bild hochladen
        const storageRef = storage.ref('products/' + Date.now() + '_' + file.name);
        await storageRef.put(file);
        const imageUrl = await storageRef.getDownloadURL();

        // Produkt in Firestore speichern
        await db.collection("products").add({
          name: name,
          description: desc,
          price: price,
          qty: qty,
          imageUrl: imageUrl
        });

        alert("Produkt wurde erfolgreich hochgeladen.");
        
        // Felder zurücksetzen
        document.getElementById("name").value = "";
        document.getElementById("desc").value = "";
        document.getElementById("price").value = "";
        document.getElementById("qty").value = "";
        document.getElementById("image").value = "";
      } catch (e) {
        alert("Fehler beim Hochladen.");
        console.error(e);
      }
    };

    // Prüfen, ob bereits angemeldet
    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("uploadSection").style.display = "block";
      }
    });
  </script>
</body>
</html>
